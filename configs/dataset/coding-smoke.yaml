environment: development

paths:
  data: ../../data
  cache: ../../artifacts/cache
  artifacts: ../../artifacts

dataset:
  name: coding-smoke
  version: 1.1.0
  license: MIT AND Apache-2.0
  created_at: "2026-07-20T00:00:00+06:00"
  description: Pinned nanoGPT, minGPT, CodeSearchNet, and lit-llama snapshots for smoke testing.
  sources:
    - path: ../../data/coding-smoke/train/nanoGPT
      format: git
      split: train
      language: en
      license: MIT
      include_extensions: [.json, .md, .py, .sh, .toml, .txt, .yaml, .yml]
    - path: ../../data/coding-smoke/train/minGPT
      format: git
      split: train
      language: en
      license: MIT
      include_extensions: [.json, .md, .py, .sh, .toml, .txt, .yaml, .yml]
    - path: ../../data/coding-smoke/train/CodeSearchNet
      format: git
      split: train
      language: en
      license: MIT
      include_extensions: [.json, .md, .py, .sh, .toml, .txt, .yaml, .yml]
    - path: ../../data/coding-smoke/validation/lit-llama
      format: git
      split: validation
      language: en
      license: Apache-2.0
      include_extensions: [.json, .md, .py, .sh, .toml, .txt, .yaml, .yml]
