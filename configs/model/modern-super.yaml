model:
  vocab_size: 32000
  context_length: 8192
  d_model: 1024
  n_heads: 16
  n_kv_heads: 4
  d_ff: 2816
  dropout: 0.0
  bias: false
  layer_norm_epsilon: 0.00001
  n_layers: 24
  initializer_range: 0.02
  tie_embeddings: true
  position_encoding: rope
  rope_theta: 500000.0
  normalization: rmsnorm
  feed_forward: swiglu
  use_sdpa: true
